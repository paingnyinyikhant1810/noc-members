<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Portal</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Context Menu -->
    <div id="contextMenu" class="hidden context-menu">
        <button onclick="renameItem()" class="ctx-btn">
            <i class="fas fa-pen"></i> Rename
        </button>
        <hr class="ctx-divider">
        <button onclick="deleteItem()" class="ctx-btn ctx-danger">
            <i class="fas fa-trash"></i> Delete
        </button>
    </div>

    <!-- Info Card Context Menu -->
    <div id="infoCardContextMenu" class="hidden context-menu">
        <button onclick="editInfoCardFromContext()" class="ctx-btn">
            <i class="fas fa-edit"></i> Edit
        </button>
        <hr class="ctx-divider">
        <button onclick="deleteInfoCardFromContext()" class="ctx-btn ctx-danger">
            <i class="fas fa-trash"></i> Delete
        </button>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  LOGIN PAGE                                         -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="loginPage" class="login-page">
        <div id="loginBox" class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-users"></i>
                </div>
                <h1 class="login-title">NOC Portal</h1>
                <p class="login-sub">Welcome, Sign in to continue</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" class="form-input" placeholder="Enter username" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" class="form-input form-input--pw" placeholder="Enter password" autocomplete="current-password">
                        <button type="button" id="togglePassword" class="eye-btn">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="btn-login">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  MAIN APP                                           -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="mainApp" class="hidden">

        <!-- Mobile Overlay -->
        <div id="mobileOverlay" class="hidden mobile-overlay" onclick="closeMobileMenu()"></div>

        <!-- Mobile Sidebar -->
        <div id="mobileMenu" class="mobile-menu hidden">
            <div class="mobile-menu-header">
                <div class="mobile-menu-logo"><i class="fas fa-users"></i></div>
                <div>
                    <div class="fw-bold">NOC Portal</div>
                    <div class="text-sm text-muted" id="mobileWelcome">Welcome</div>
                </div>
            </div>
            <nav class="mobile-nav">
                <button onclick="navigateTo('home'); closeMobileMenu();" class="mobile-nav-btn" data-page="home">
                    <i class="fas fa-home"></i> Home
                </button>
                <button onclick="navigateTo('learning'); closeMobileMenu();" class="mobile-nav-btn" data-page="learning">
                    <i class="fas fa-book"></i> Learning
                </button>
                <div id="mobileAdminBtn" class="hidden">
                    <button onclick="navigateTo('admin'); closeMobileMenu();" class="mobile-nav-btn" data-page="admin">
                        <i class="fas fa-cog"></i> Admin Panel
                    </button>
                </div>
                <div class="mobile-nav-section">
                    <p class="mobile-nav-label">Information</p>
                    <div id="mobileInfoMenu"></div>
                </div>
            </nav>
            <div class="mobile-menu-footer">
                <button onclick="logout()" class="mobile-logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Top Navigation -->
        <nav class="topnav">
            <div class="topnav-inner">
                <div class="topnav-left">
                    <button onclick="openMobileMenu()" class="hamburger-btn desktop-hidden">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="topnav-logo"><i class="fas fa-users"></i></div>
                    <span class="topnav-title mobile-hidden">NOC Portal</span>
                </div>
                <div class="topnav-right desktop-only">
                    <button onclick="navigateTo('home')" class="nav-btn" data-page="home">
                        <i class="fas fa-home"></i> Home
                    </button>
                    <button onclick="navigateTo('learning')" class="nav-btn" data-page="learning">
                        <i class="fas fa-book"></i> Learning
                    </button>
                    <div class="dropdown-wrap">
                        <button onclick="toggleInfoDropdown()" class="nav-btn" data-page="information">
                            <i class="fas fa-info-circle"></i> Information <i class="fas fa-chevron-down caret"></i>
                        </button>
                        <div id="infoDropdown" class="hidden dropdown-menu"></div>
                    </div>
                    <button id="adminBtn" onclick="navigateTo('admin')" class="nav-btn hidden" data-page="admin">
                        <i class="fas fa-cog"></i> Admin Panel
                    </button>
                    <button onclick="logout()" class="nav-btn nav-btn--logout">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </nav>

        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <div class="welcome-inner">
                <p class="welcome-text">Hi, <span id="welcomeUser" class="fw-bold"></span>! 👋</p>
            </div>
        </div>

        <!-- ── Home Page ──────────────────────────────────── -->
        <div id="homePage" class="page page-container">
            <div class="page-header">
                <h2 class="page-title">
                    <div class="page-icon page-icon--blue"><i class="fas fa-bullhorn"></i></div>
                    Team Updates
                </h2>
                <button id="addUpdateBtn" onclick="openUpdateModal()" class="hidden btn-primary">
                    <i class="fas fa-plus"></i> Add Update
                </button>
            </div>
            <div id="updatesContainer" class="updates-grid"></div>
        </div>

        <!-- ── Learning Page ──────────────────────────────── -->
        <div id="learningPage" class="page page-container hidden">
            <div class="page-header">
                <h2 class="page-title">
                    <div class="page-icon page-icon--amber"><i class="fas fa-folder-open"></i></div>
                    Learning
                </h2>
                <div id="learningAdminBtns" class="hidden btn-group">
                    <button onclick="openFolderModal()" class="btn-secondary">
                        <i class="fas fa-folder-plus"></i> New Folder
                    </button>
                    <button onclick="openLearningItemModal()" class="btn-primary">
                        <i class="fas fa-plus"></i> Add Item
                    </button>
                </div>
            </div>
            <div id="breadcrumb" class="breadcrumb"></div>
            <div id="learningContainer" class="file-grid"></div>
        </div>

        <!-- ── Information Page ───────────────────────────── -->
        <div id="informationPage" class="page page-container hidden">
            <div class="page-header">
                <h2 id="infoPageTitle" class="page-title">
                    <div class="page-icon page-icon--blue"><i class="fas fa-layer-group"></i></div>
                    <span id="infoTitleText">Information</span>
                </h2>
                <button id="addInfoCardBtn" onclick="openInfoCardModal()" class="hidden btn-primary">
                    <i class="fas fa-plus"></i> Add Item
                </button>
            </div>
            <div id="infoCardsContainer" class="file-grid"></div>
        </div>

        <!-- ── Admin Page ─────────────────────────────────── -->
        <div id="adminPage" class="page page-container hidden">
            <h2 class="page-title mb-6">
                <div class="page-icon page-icon--blue"><i class="fas fa-shield-alt"></i></div>
                Admin Panel
            </h2>
            <div class="admin-tabs">
                <button onclick="showAdminTab('users')" class="admin-tab" data-tab="users">
                    <i class="fas fa-users"></i> Users
                </button>
                <button onclick="showAdminTab('categories')" class="admin-tab" data-tab="categories">
                    <i class="fas fa-tags"></i> Categories
                </button>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="admin-tab-content">
                <div class="tab-toolbar">
                    <button onclick="openUserModal()" class="btn-primary">
                        <i class="fas fa-user-plus"></i> Add User
                    </button>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Account</th>
                                <th class="col-hide-sm">Username</th>
                                <th>Password</th>
                                <th>Role</th>
                                <th class="text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- Categories Tab -->
            <div id="categoriesTab" class="admin-tab-content hidden">
                <div class="tab-toolbar">
                    <button onclick="openCategoryModal()" class="btn-primary">
                        <i class="fas fa-plus"></i> Add Category
                    </button>
                </div>
                <div id="categoriesList" class="categories-grid"></div>
            </div>
        </div>

    </div><!-- /mainApp -->

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  MODALS                                             -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Update Modal -->
    <div id="updateModal" class="hidden modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="updateModalTitle" class="modal-title">Add Update</h3>
                <button onclick="closeModal('updateModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form id="updateForm" class="modal-body">
                <input type="hidden" id="updateId">
                <div class="form-group">
                    <label class="form-label">Topic</label>
                    <input type="text" id="updateTopic" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Badge</label>
                    <select id="updateBadge" class="form-input">
                        <option value="important">🔴 Important</option>
                        <option value="general">🔵 General</option>
                        <option value="announcement">🟢 Announcement</option>
                        <option value="reminder">🟡 Reminder</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea id="updateMessage" rows="4" class="form-input" required></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('updateModal')" class="btn-secondary">Cancel</button>
                <button onclick="saveUpdate()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal" class="hidden modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="userModalTitle" class="modal-title">Add User</h3>
                <button onclick="closeModal('userModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form id="userForm" class="modal-body">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label class="form-label">Account Name (Display)</label>
                    <input type="text" id="userAccountName" class="form-input" placeholder="e.g. Operations User" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Username (Login)</label>
                    <input type="text" id="userUsername" class="form-input" placeholder="e.g. operations" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="userPassword" class="form-input" required>
                        <button type="button" id="toggleEditPassword" onclick="toggleEditPasswordVisibility()" class="eye-btn eye-btn--right">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select id="userRole" class="form-input">
                        <option value="intern">Intern</option>
                        <option value="member">Member</option>
                        <option value="leader">Leader</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('userModal')" class="btn-secondary">Cancel</button>
                <button onclick="saveUser()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="hidden modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="categoryModalTitle" class="modal-title">Add Category</h3>
                <button onclick="closeModal('categoryModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form id="categoryForm" class="modal-body">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label class="form-label">Category Name</label>
                    <input type="text" id="categoryName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Icon</label>
                    <select id="categoryIcon" class="form-input">
                        <option value="fa-users">👥 Team</option>
                        <option value="fa-clipboard-list">📋 Procedures</option>
                        <option value="fa-briefcase">💼 Business</option>
                        <option value="fa-chart-line">📈 Analytics</option>
                        <option value="fa-cogs">⚙️ Settings</option>
                        <option value="fa-book">📚 Documentation</option>
                        <option value="fa-link">🔗 Links</option>
                        <option value="fa-tools">🛠️ Tools</option>
                    </select>
                </div>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('categoryModal')" class="btn-secondary">Cancel</button>
                <button onclick="saveCategory()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Folder Modal -->
    <div id="folderModal" class="hidden modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="folderModalTitle" class="modal-title">Create Folder</h3>
                <button onclick="closeModal('folderModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form id="folderForm" class="modal-body">
                <input type="hidden" id="folderId">
                <div class="form-group">
                    <label class="form-label">Folder Name</label>
                    <input type="text" id="folderName" class="form-input" required>
                </div>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('folderModal')" class="btn-secondary">Cancel</button>
                <button onclick="saveFolder()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Learning Item Modal -->
    <div id="learningItemModal" class="hidden modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="learningItemModalTitle" class="modal-title">Add Item</h3>
                <button onclick="closeModal('learningItemModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form id="learningItemForm" class="modal-body">
                <input type="hidden" id="learningItemId">
                <div class="form-group">
                    <label class="form-label">Topic / Title</label>
                    <input type="text" id="learningItemTopic" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select id="learningItemType" onchange="toggleLearningItemFields()" class="form-input">
                        <option value="pdf">Link / PDF</option>
                        <option value="text">Text Note</option>
                    </select>
                </div>
                <div id="pdfLinkField" class="form-group">
                    <label class="form-label">Link URL</label>
                    <input type="url" id="learningItemLink" class="form-input" placeholder="https://...">
                </div>
                <div id="textContentField" class="form-group hidden">
                    <label class="form-label">Content</label>
                    <textarea id="learningItemContent" rows="6" class="form-input form-textarea"></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('learningItemModal')" class="btn-secondary">Cancel</button>
                <button onclick="saveLearningItem()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Text View Modal -->
    <div id="textViewModal" class="hidden modal-backdrop">
        <div class="modal-box modal-box--wide">
            <div class="modal-header">
                <h3 id="textViewTitle" class="modal-title"></h3>
                <button onclick="closeModal('textViewModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div id="textViewContent" class="text-view-content"></div>
        </div>
    </div>

    <!-- Info Card Modal -->
    <div id="infoCardModal" class="hidden modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="infoCardModalTitle" class="modal-title">Add Item</h3>
                <button onclick="closeModal('infoCardModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form id="infoCardForm" class="modal-body">
                <input type="hidden" id="infoCardId">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" id="infoCardTitle" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Display Type</label>
                    <select id="infoCardDisplayType" onchange="toggleInfoCardFields()" class="form-input">
                        <option value="icon">Icon</option>
                        <option value="image">Image</option>
                    </select>
                </div>
                <div id="iconField" class="form-group">
                    <label class="form-label">Icon</label>
                    <select id="infoCardIcon" class="form-input">
                        <option value="fa-link">🔗 Link</option>
                        <option value="fa-file-alt">📄 Document</option>
                        <option value="fa-globe">🌐 Website</option>
                        <option value="fa-database">🗄️ Database</option>
                        <option value="fa-chart-bar">📊 Chart</option>
                        <option value="fa-calendar">📅 Calendar</option>
                        <option value="fa-envelope">✉️ Email</option>
                        <option value="fa-phone">📞 Phone</option>
                        <option value="fa-map-marker-alt">📍 Location</option>
                        <option value="fa-video">🎥 Video</option>
                        <option value="fa-image">🖼️ Image</option>
                        <option value="fa-code">💻 Code</option>
                    </select>
                </div>
                <div id="imageField" class="hidden">
                    <div class="form-group">
                        <label class="form-label">Image Source</label>
                        <div class="btn-group">
                            <button type="button" onclick="setImageSource('url')" id="imgSourceUrl" class="btn-primary flex-1">
                                <i class="fas fa-link"></i> URL
                            </button>
                            <button type="button" onclick="setImageSource('upload')" id="imgSourceUpload" class="btn-secondary flex-1">
                                <i class="fas fa-upload"></i> Upload
                            </button>
                        </div>
                    </div>
                    <div id="imageUrlField" class="form-group">
                        <input type="url" id="infoCardImageUrl" class="form-input" placeholder="https://example.com/image.jpg">
                    </div>
                    <div id="imageUploadField" class="form-group hidden">
                        <label class="upload-label">
                            <div id="uploadPlaceholder">
                                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                                <p>Click to upload image</p>
                                <p class="text-sm text-muted">PNG, JPG up to 2MB</p>
                            </div>
                            <div id="uploadPreview" class="hidden">
                                <img id="previewImg" class="upload-preview-img" src="" alt="Preview">
                            </div>
                            <input type="file" id="infoCardImageFile" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                        </label>
                    </div>
                    <input type="hidden" id="infoCardImage">
                </div>
                <div class="form-group">
                    <label class="form-label">Link URL</label>
                    <input type="url" id="infoCardLink" class="form-input" placeholder="https://..." required>
                </div>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('infoCardModal')" class="btn-secondary">Cancel</button>
                <button onclick="saveInfoCard()" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div id="renameModal" class="hidden modal-backdrop">
        <div class="modal-box modal-box--sm">
            <div class="modal-header">
                <h3 class="modal-title">Rename</h3>
                <button onclick="closeModal('renameModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <form class="modal-body">
                <input type="text" id="renameInput" class="form-input" required>
            </form>
            <div class="modal-footer">
                <button onclick="closeModal('renameModal')" class="btn-secondary">Cancel</button>
                <button onclick="confirmRename()" class="btn-primary">Rename</button>
            </div>
        </div>
    </div>

    <!-- Move Modal -->
    <div id="moveModal" class="hidden modal-backdrop">
        <div class="modal-box modal-box--sm">
            <div class="modal-header">
                <h3 class="modal-title">Move To...</h3>
                <button onclick="closeModal('moveModal')" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div id="moveFolderList" class="modal-body move-list"></div>
            <div class="modal-footer">
                <button onclick="closeModal('moveModal')" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</html>
